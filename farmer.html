<!DOCTYPE html>
<html>
<head>
  <title>Farmer Dashboard - FTMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body onload="loadFarmerRequests()">

<script>
let user = JSON.parse(localStorage.getItem("user"));
if (!user || user.role !== "farmer") location.href="login.html";
</script>

<div class="dashboard">
  <div class="sidebar">
    <h3><i class="fas fa-user-farmer"></i> Farmer Dashboard</h3>
    <button onclick="show('create')"><i class="fas fa-plus"></i> Create Request</button>
    <button onclick="show('list')"><i class="fas fa-list"></i> My Requests</button>
    <button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>

  <div class="main">
    <div id="create" class="section active">
      <h2>Create New Transport Request</h2>
      <label for="fname">Farmer Name</label>
      <input id="fname" placeholder="Your name">

      <label for="phone">Phone</label>
      <input id="phone" placeholder="Phone number">

      <label for="from">Pickup Location</label>
      <input id="from" placeholder="From (village/city)">

      <label for="to">Destination</label>
      <input id="to" placeholder="To (market/city)">

      <label for="crop">Crop Type</label>
      <input id="crop" placeholder="Wheat, Rice, Fruits, Vegetables">

      <label for="load">Load (kg)</label>
      <input id="load" type="number" placeholder="500">

      <label for="distance">Distance (km)</label>
      <input id="distance" type="number" placeholder="50">

      <button onclick="createTransport()" class="btn-login accept-btn">
        <i class="fas fa-paper-plane"></i> Submit Request
      </button>
    </div>

    <div id="list" class="section">
      <h2>Your Transport Requests</h2>
      <div id="requests"></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
<script src="firebase-setup.js"></script>
<script src="script.js"></script>

</body>
</html>
