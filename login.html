<!DOCTYPE html>
<html>
<head>
  <title>Login - FTMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-container">
  <div style="text-align: center; margin-bottom: 2rem;">
    <button onclick="toggleForm('login')" id="login-toggle" class="role-btn active">Login</button>
    <button onclick="toggleForm('signup')" id="signup-toggle" class="role-btn">Sign Up</button>
  </div>

  <h2 id="form-title"><i class="fas fa-sign-in-alt"></i> Login</h2>

  <div id="signup-section" style="display: none;">
    <label for="name">Full Name</label>
    <input id="name" placeholder="Your full name" required>
    
    <label for="phone">Phone Number</label>
    <input id="phone" placeholder="Phone number">
  </div>

  <label for="email">Email</label>
  <input id="email" placeholder="Enter your email" required>
  
  <label for="password">Password</label>
  <input id="password" type="password" placeholder="Enter your password" required>

  <div style="display:flex;gap:1rem;margin:1rem 0;">
    <button onclick="setRole('farmer')" id="role-farmer" class="role-btn active">Farmer</button>
    <button onclick="setRole('driver')" id="role-driver" class="role-btn">Driver</button>
  </div>
  <input type="hidden" id="role" value="farmer">

  <button id="submit-btn" onclick="submitForm()" class="btn-login btn-primary">
    <i class="fas fa-sign-in-alt"></i> Login
  </button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
<script src="firebase-setup.js"></script>
<script src="script.js"></script>
<script>
function setRole(role) {
  document.getElementById('role').value = role;
  document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('role-'+role).classList.add('active');
}
</script>
</body>
</html>
